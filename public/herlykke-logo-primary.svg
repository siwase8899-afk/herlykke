<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120">
  <defs>
    <linearGradient id="citrusGradPrimary" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FBBC4B"/>
      <stop offset="100%" stop-color="#E8920A"/>
    </linearGradient>
    <clipPath id="crescentClipPrimary">
      <path d="M 50.5 10.9 A 50 50 0 1 1 109.1 69.5 A 42 42 0 0 0 50.5 10.9 Z"/>
    </clipPath>
  </defs>

  <!-- Crescent moon icon (left side, ~100px) -->
  <g transform="translate(5, 10) scale(0.83)">
    <!-- Crescent body -->
    <path
      d="M 50.5 10.9 A 50 50 0 1 1 109.1 69.5 A 42 42 0 0 0 50.5 10.9 Z"
      fill="url(#citrusGradPrimary)"
    />

    <!-- Peel outline -->
    <path
      d="M 50.5 10.9 A 50 50 0 1 1 109.1 69.5 A 42 42 0 0 0 50.5 10.9 Z"
      fill="none"
      stroke="#E8920A"
      stroke-width="1"
      opacity="0.3"
    />

    <!-- Citrus segment lines -->
    <g clip-path="url(#crescentClipPrimary)" opacity="0.65" stroke="#FEF3D0" stroke-width="1.5" fill="none">
      <path d="M 30 85 Q 55 55 45 20"/>
      <path d="M 18 65 Q 48 50 55 12"/>
      <path d="M 40 105 Q 60 70 38 35"/>
    </g>
  </g>

  <!-- HERLYKKE wordmark -->
  <text
    x="125"
    y="68"
    font-family="'Nunito', sans-serif"
    font-weight="700"
    font-size="36"
    fill="#2F3A3D"
    letter-spacing="3"
  >HERLYKKE</text>
</svg>
